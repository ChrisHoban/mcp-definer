name: CI
permissions:
  contents: read
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level=high

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: mcp_definer
          POSTGRES_PASSWORD: mcp_definer
          POSTGRES_DB: mcp_definer
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mcp_definer -d mcp_definer"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://mcp_definer:mcp_definer@localhost:5432/mcp_definer
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test:coverage
      - run: pnpm test:web:coverage
      - run: pnpm test:web:build
      - uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/lcov.info,coverage/web/lcov.info
          fail_ci_if_error: false

  contract-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm contract-test

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: mcp_definer
          POSTGRES_PASSWORD: mcp_definer
          POSTGRES_DB: mcp_definer
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mcp_definer -d mcp_definer"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://mcp_definer:mcp_definer@localhost:5432/mcp_definer
      MOCK_MODE: 'true'
      MCP_DEFINER_API_KEY: ci-test-key
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:integration

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: mcp_definer
          POSTGRES_PASSWORD: mcp_definer
          POSTGRES_DB: mcp_definer
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mcp_definer -d mcp_definer"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://mcp_definer:mcp_definer@localhost:5432/mcp_definer
      REGISTRY_STORE: postgres
      RUN_MIGRATIONS_ON_STARTUP: 'true'
      MOCK_MODE: 'false'
      MCP_DEFINER_API_KEY: ci-e2e-key
      VITEST: 'false'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:e2e
